<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chadna — Submit in 4 minutes. Pay. Done.</title>
<meta name="description" content="Two visa filings, one click each. J-1 to F-1 change of status, $2,000 flat. Asylum applications, $4,000 flat. Licensed immigration attorneys included." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
<link rel="stylesheet" href="uscis.css">
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="flows.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>

<script type="text/babel">
const { useState } = React;

function App() {
  const [flow, setFlow] = useState(null); // 'j1f1' | 'asylum' | null

  return (
    <div className="app">
      <Nav onCTA={() => setFlow('j1f1')} />
      <Hero onStart={setFlow} />
      <Strip />
      <HowItWorks />
      <LetterWall />
      <Attorneys />
      <CTA onStart={setFlow} />
      <Footer />

      <FlowController kind={flow} open={!!flow} onClose={() => setFlow(null)} />
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
